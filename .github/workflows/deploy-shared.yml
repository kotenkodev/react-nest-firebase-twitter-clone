name: Shared Deploy Workflow

on:
  workflow_call:
    inputs:
      directory:
        required: true
        type: string
      build-command:
        required: true
        type: string
      deploy-only:
        required: true
        type: string
    secrets:
      FIREBASE_TOKEN:
        required: true
      ENV_FILE:
        required: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./${{ inputs.directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./${{ inputs.directory }}/package-lock.json"

      - name: Create .env file
        if: ${{ env.ENV_FILE_CONTENT != '' }}
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          printf "%s" "$ENV_FILE_CONTENT" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only ${{ inputs.deploy-only }} --project birb-b5fcf
        working-directory: .
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
